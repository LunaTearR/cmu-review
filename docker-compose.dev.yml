services:
  postgres:
    image: postgres:16-alpine
    container_name: cmu-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cmu-review-net

  redis:
    image: redis:7-alpine
    container_name: cmu-review-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cmu-review-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cmu-review-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      APP_PORT: 8080
      APP_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - go_mod_cache:/root/go/pkg/mod
    networks:
      - cmu-review-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cmu-review-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-8000}:8000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - cmu-review-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cmu-review-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cmu-review-net

volumes:
  postgres_data:
  redis_data:
  go_mod_cache:
  frontend_node_modules:

networks:
  cmu-review-net:
    driver: bridge
