services:
  postgres:
    image: postgres:16-alpine
    container_name: cmu-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cmu-review-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmu-review-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      APP_PORT: 8080
      APP_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - cmu-review-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cmu-review-frontend
    restart: unless-stopped
    # env_file:
    #   - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    networks:
      - cmu-review-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cmu-review-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cmu-review-net

volumes:
  postgres_data:

networks:
  cmu-review-net:
    driver: bridge